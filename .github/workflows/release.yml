name: Release Desktop Builds

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag
        required: true
        default: v1.0.0

permissions:
  contents: write

jobs:
  windows-and-web:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - name: Cache Godot export templates
        uses: actions/cache@v4
        with:
          path: ~\AppData\Roaming\Godot\export_templates\4.7.stable
          key: godot-4.7-stable-export-templates
      - name: Install Godot and export templates
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force tools/godot | Out-Null
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_win64.exe.zip" -OutFile tools/godot/godot.zip
          Expand-Archive tools/godot/godot.zip tools/godot -Force
          $templateDir = Join-Path $env:APPDATA "Godot/export_templates/4.7.stable"
          if (-not (Test-Path (Join-Path $templateDir "web_release.zip"))) {
            Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz" -OutFile tools/godot/templates.tpz
            New-Item -ItemType Directory -Force tools/godot/template-unpack | Out-Null
            tar -xf tools/godot/templates.tpz -C tools/godot/template-unpack
            New-Item -ItemType Directory -Force $templateDir | Out-Null
            Copy-Item tools/godot/template-unpack/templates/* $templateDir -Recurse -Force
          }
      - run: npm ci --prefix electron
      - name: Bootstrap Godot imports
        shell: pwsh
        run: |
          & tools/godot/Godot_v4.7-stable_win64_console.exe --headless --editor --path . --quit
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - run: npm run build:win --prefix electron
      - name: Electron runtime smoke
        run: npm run smoke --prefix electron -- level_01
      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: electron/dist/*.exe
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: godot-web-export
          path: electron/godot-export/web
          if-no-files-found: error

  macos:
    runs-on: macos-14
    needs: windows-and-web
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci --prefix electron
      - uses: actions/download-artifact@v4
        with:
          name: godot-web-export
          path: electron/godot-export/web
      - name: Build unsigned Intel and Apple-silicon packages
        working-directory: electron
        run: npx electron-builder --mac --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [windows-and-web, macos]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-builds"
          path: release
          merge-multiple: true
      - name: Generate checksums and manifest
        run: |
          cd release
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          find . -maxdepth 1 -type f -printf '%f\n' | sort > ARTIFACTS.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          mapfile -t files < <(find release -maxdepth 1 -type f | sort)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --title "Shrugame 1.0.0" --notes-file docs/RELEASE_NOTES_1.0.0.md
          fi
